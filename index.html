<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ColorPlay Generator</title>

<style>
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}
.wrap {
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.card {
  background:white;
  padding:18px;
  border-radius:12px;
  margin-bottom:16px;
}
.row { margin-bottom:14px; }
label { font-weight:bold; display:block; margin-bottom:6px; }
.flex { display:flex; gap:10px; align-items:center; }
input[type=range] { flex:1; }
input[type=number] { width:80px; padding:6px; }
select { padding:8px; width:100%; }

.preview {
  height:220px;
  border-radius:10px;
  margin-top:12px;
}

.output {
  margin-top:12px;
  padding:10px;
  background:#f1f1f1;
  border-radius:8px;
  font-weight:bold;
}

.recipe { margin-top:10px; }

</style>
</head>

<body>
<div class="wrap">

<h2>ColorPlay Generator</h2>

<div class="card">

<div class="row">
<label>Base Color</label>
<select id="base">
<option>Red</option>
<option selected>Yellow</option>
<option>Green</option>
<option>Cyan</option>
<option>Blue</option>
<option>Magenta</option>
</select>
</div>

<div class="row">
<label>Hue Adjust</label>
<div class="flex">
<input id="adjust" type="range" min="-255" max="255" value="27">
<input id="adjustInput" type="number" min="-255" max="255" value="27">
</div>
</div>

<div class="row">
<label>Saturation</label>
<div class="flex">
<input id="saturation" type="range" min="0" max="100" value="67">
<input id="saturationInput" type="number" min="0" max="100" value="67">
</div>
</div>

<div class="row">
<label>Brightness</label>
<div class="flex">
<input id="brightness" type="range" min="0" max="100" value="100">
<input id="brightnessInput" type="number" min="0" max="100" value="100">
</div>
</div>

<div id="preview" class="preview"></div>

<div class="output">
HEX: <span id="hex"></span><br>
RGB: <span id="rgb"></span>
</div>

<div id="recipe" class="recipe"></div>

</div>
</div>

<script>
const BASES = {
  Red:0,
  Yellow:60,
  Green:120,
  Cyan:180,
  Blue:240,
  Magenta:300
};

const baseEl = document.getElementById('base');
const adjustEl = document.getElementById('adjust');
const adjustInput = document.getElementById('adjustInput');
const satEl = document.getElementById('saturation');
const satInput = document.getElementById('saturationInput');
const brightEl = document.getElementById('brightness');
const brightInput = document.getElementById('brightnessInput');
const preview = document.getElementById('preview');
const recipe = document.getElementById('recipe');
const hexEl = document.getElementById('hex');
const rgbEl = document.getElementById('rgb');

function clamp(v,min,max){ return Math.min(max,Math.max(min,Number(v)||0)); }
function wrap(h){ h%=360; return h<0?h+360:h; }

function hsvToRgb(h,s,v){
s/=100; v/=100;
let c=v*s;
let x=c*(1-Math.abs((h/60)%2-1));
let m=v-c;
let r=0,g=0,b=0;
if(h<60){r=c;g=x}
else if(h<120){r=x;g=c}
else if(h<180){g=c;b=x}
else if(h<240){g=x;b=c}
else if(h<300){r=x;b=c}
else{r=c;b=x}
return [
Math.round((r+m)*255),
Math.round((g+m)*255),
Math.round((b+m)*255)
];
}

function getHue(base, adjust){
const baseDeg = BASES[base];
const shift = (adjust / 255) * 60;
return wrap(baseDeg + shift);
}

function sync(){
adjustEl.value = adjustInput.value = clamp(adjustEl.value,-255,255);
satEl.value = satInput.value = clamp(satEl.value,0,100);
brightEl.value = brightInput.value = clamp(brightEl.value,0,100);
}

function render(){
sync();

let base = baseEl.value;
let adjust = Number(adjustEl.value);
let sat = Number(satEl.value);
let bright = Number(brightEl.value);

let h = getHue(base, adjust);
let [r,g,b] = hsvToRgb(h,sat,bright);

let hex = '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();

preview.style.background = hex;

hexEl.textContent = hex;
rgbEl.textContent = `${r}, ${g}, ${b}`;

recipe.textContent = `Base: ${base} | Hue: ${adjust} | Sat: ${sat} | Bright: ${bright}`;
}

[adjustEl,adjustInput,satEl,satInput,brightEl,brightInput,baseEl].forEach(el=>{
el.addEventListener('input',()=>{
if(el===adjustInput) adjustEl.value=el.value;
if(el===satInput) satEl.value=el.value;
if(el===brightInput) brightEl.value=el.value;
if(el===adjustEl) adjustInput.value=el.value;
if(el===satEl) satInput.value=el.value;
if(el===brightEl) brightInput.value=el.value;
render();
});
});

render();
</script>

</body>
</html>
